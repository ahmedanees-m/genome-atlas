    type: Bridge_Recombinase
    subtype: IS110
    mechanism_bucket: DSB_FREE_TRANSEST_RECOMBINASE
    proteins: [D2TGM5]
    organism: "Citrobacter rodentium ICC168"
    pfam: [PF01548, PF02371]
    rna_components: [bridge_RNA]
    canonical_structures: []
    reference_doi: "10.1126/science.adz1884"        # Pelea 2026 Science (canonical publication)
    reference_doi_2: "10.1101/2025.05.14.653916"    # Perry 2025 bioRxiv (preprint; deprecated label)
    notes: "Canonical name per UniProt D2TGM5 gene name + Pelea 2026 Science. IS622 is the deprecated preprint label from Perry et al. 2025 bioRxiv (Hsu lab); retired upon publication. Both names refer to the identical gene and protein (326 aa, PF01548+PF02371 dual-domain IS110 bridge recombinase). >6% insertion efficiency in human cells (Pelea 2026 Science); 20% with engineered bRNAs (Perry 2025 bioRxiv). Highest-profile IS110 human-cell result after IS621; tier_a_gate fires."
    tier_a_gate: true
    added_version: v0.7.1
    renamed_version: v0.7.2

# RNA guide/scaffold components for the systems above.
# Each entry becomes an RNA node. The 'name' must match entries in rna_components
# lists above so that HAS_RNA edges can be built automatically.
rnas:
  - name: sgRNA
    rna_type: guide_RNA
    length_nt: 100
    notes: "Single guide RNA; fused crRNA+tracrRNA; used by Cas9 variants and V-K CAST"

  - name: crRNA
    rna_type: guide_RNA
    length_nt: 42
    notes: "CRISPR RNA; processed spacer+repeat; used by Cas12a/f, CAST I-F, TnsABC"

  - name: tracrRNA
    rna_type: scaffold_RNA
    length_nt: 67
    notes: "Trans-activating crRNA; base-pairs with crRNA repeat; required by Cas12f"

  - name: bridge_RNA
    rna_type: guide_RNA
    length_nt: 35
    notes: "Two-tethered-loop RNA; guides IS110 bridge recombinase; Durrant 2024"

  - name: omegaRNA
    rna_type: guide_RNA
    length_nt: 400
    notes: "Omega RNA; guides Fanzor endonucleases; eukaryotic system"

  - name: pegRNA
    rna_type: guide_RNA
    length_nt: 120
    notes: "Prime editing guide RNA; spacer + PBS + RT template; used by PE2, PE3, twinPE"

  - name: nicking_sgRNA
    rna_type: guide_RNA
    length_nt: 100
    notes: "Nicking guide RNA for PE3; targets non-edited strand ~50-100 nt from pegRNA cut; improves PE efficiency 3-fold"
