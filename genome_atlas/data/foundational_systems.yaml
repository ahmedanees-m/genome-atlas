# Hand-curated systems used as the core System node set in ATLAS.
# Every entry here becomes a System node with outgoing edges to Proteins and Mechanisms.
# Protein accessions are chosen from those present in targets_v2.parquet (9,500-protein atlas).

systems:
  - name: SpCas9
    type: CRISPR-Cas
    subtype: Type II-A
    mechanism_bucket: DSB_NUCLEASE
    proteins: [Q99ZW2]
    rna_components: [sgRNA]
    canonical_structures: [4UN3, 5F9R]
    reference_doi: "10.1126/science.1225829"
    notes: "Canonical CRISPR-Cas9; guide RNA-targeted DSB"

  - name: Cas12a
